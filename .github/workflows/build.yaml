# .github/workflows/build.yml

name: Build autoware_tensorrt_vad

on:
  pull_request:
    branches: [ dev/ns-ros-node ] # dev/ns-ros-nodeブランチへのプルリクエスト作成・更新時

# ccacheを有効にするための環境変数
env:
  CC: /usr/lib/ccache/gcc
  CXX: /usr/lib/ccache/g++
  # ccacheのディレクトリを指定
  CCACHE_DIR: /github/home/.ccache

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. NVIDIA Container Registryへのログイン
      - name: Log in to NVIDIA Container Registry
        uses: docker/login-action@v3
        with:
          registry: nvcr.io
          username: $oauthtoken
          password: ${{ secrets.NGC_API_KEY }}

      # 3. システム依存関係のインストール
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
        shell: bash

      # 4. ccacheのキャッシュを復元
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          # キャッシュキー: ブランチ、アーキテクチャ、ROSディストロで構成
          key: ccache-${{ github.ref_name }}-${{ runner.arch }}-humble
          restore-keys: |
            ccache-${{ github.ref_name }}-${{ runner.arch }}-humble-

      # 5. ビルド前のccache統計情報を表示
      - name: Show ccache stats before build and reset stats
        run: |
          mkdir -p ${{ env.CCACHE_DIR }}
          ccache -s
          ccache -z
        shell: bash

      # 5. autoware_tensorrt_vad パッケージをビルド (コンテナ内で実行)
      - name: Build and Test in Container
        # docker runコマンドでコンテナを起動し、複数のステップをまとめて実行
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workdir \
            -w /workdir \
            nvcr.io/nvidia/isaac-ros-dev-x86_64:2.0.0-humble \
            /bin/bash -c "
              set -e
              
              # ROS依存関係のインストール
              cd AV-Solutions/vad-trt/app
              source /opt/ros/humble/setup.bash
              rosdep update --include-eol-distros
              rosdep install --from-paths . --ignore-src -r -y
              
              # ビルドの実行
              colcon build \
                --packages-select autoware_tensorrt_vad \
                --symlink-install \
                --cmake-args \
                  -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                  -DCMAKE_BUILD_TYPE=Release
            "
        shell: bash

      # 7. ビルド後のccache統計情報を表示
      - name: Show ccache stats after build
        if: always()
        run: ccache -s
        shell: bash
