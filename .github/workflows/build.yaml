# .github/workflows/build.yml

name: Build autoware_tensorrt_vad

on:
  pull_request:
    branches: [ dev/ns-ros-node ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 【変更】ジョブ全体をコンテナ内で実行するよう指定
    container:
      # 使用するコンテナイメージ
      image: nvcr.io/nvidia/isaac-ros-dev-x86_64:2.0.0-humble
      # 【重要】コンテナイメージをダウンロードするための認証情報を指定
      credentials:
        username: $oauthtoken
        password: ${{ secrets.NGC_API_KEY }}

    steps:
      # 1. リポジトリのチェックアウト
      # このステップは指定したコンテナ内で実行されます
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 依存関係のインストールとビルド
      - name: Install Dependencies and Build
        run: |
          set -e
          
          # コンテナ内で必要なツールを念のため更新・インストール
          apt-get update && apt-get install -y --no-install-recommends git
          
          # ワークスペースに移動
          cd AV-Solutions/vad-trt/app
          
          # ROS環境をセットアップ
          source /opt/ros/humble/setup.bash
          
          # ROS依存関係をインストール
          rosdep update --include-eol-distros
          rosdep install --from-paths . --ignore-src -r -y
          
          # ビルドを実行
          colcon build \
            --packages-select autoware_tensorrt_vad \
            --symlink-install \
            --cmake-args \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_BUILD_TYPE=Release
        shell: bash
