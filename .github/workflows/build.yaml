# .github/workflows/build.yml

name: Build autoware_tensorrt_vad

on:
  pull_request:
    branches: [ dev/ns-ros-node ] # dev/ns-ros-nodeブランチへのプルリクエスト作成・更新時

# ccacheを有効にするための環境変数
env:
  CC: /usr/lib/ccache/gcc
  CXX: /usr/lib/ccache/g++
  # ccacheのディレクトリを指定
  CCACHE_DIR: /github/home/.ccache

jobs:
  build:
    # Autowareが提供するROS 2 Humbleのコンテナイメージを使用
    container: osrf/ros:humble-desktop-full
    runs-on: ubuntu-latest
    
    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. システム依存関係のインストール
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            python3-colcon-common-extensions
        shell: bash

      # 3. ccacheのキャッシュを復元
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          # キャッシュキー: ブランチ、アーキテクチャ、ROSディストロで構成
          key: ccache-${{ github.ref_name }}-${{ runner.arch }}-humble
          restore-keys: |
            ccache-${{ github.ref_name }}-${{ runner.arch }}-humble-

      # 4. ビルド前のccache統計情報を表示
      - name: Show ccache stats before build and reset stats
        run: |
          mkdir -p ${{ env.CCACHE_DIR }}
          ccache -s
          ccache -z
        shell: bash

      # 5. ROS依存関係のインストール
      - name: Install ROS dependencies
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update --include-eol-distros
          rosdep install --from-paths . --ignore-src -r -y
        shell: bash

      # 6. autoware_tensorrt_vad パッケージをビルド
      - name: Build autoware_tensorrt_vad package
        working-directory: AV-Solutions/vad-trt/app
        run: |
          source /opt/ros/humble/setup.bash
          colcon build \
            --packages-select autoware_tensorrt_vad \
            --symlink-install \
            --cmake-args \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_BUILD_TYPE=Release
        shell: bash

      # 7. ビルド後のccache統計情報を表示
      - name: Show ccache stats after build
        if: always()
        run: ccache -s
        shell: bash
